<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Test OBJ (importmap)</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #scene {
      width: 100vw;
      height: 100vh;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>

<body>
  <div id="scene"></div>

  <script type="module">

    import * as THREE from "three";
    import { OBJLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js";
    import { MTLLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/MTLLoader.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    // =========================
    // SCENE
    // =========================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    // =========================
    // CAMERA
    // =========================
    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    // Caméra reculée + décalée
    camera.position.set(5, 3, 15);

    // Regarde le centre
    camera.lookAt(0, 0, 0);

    // =========================
    // RENDERER
    // =========================
    const renderer = new THREE.WebGLRenderer({
      antialias: true
    });

    renderer.setSize(window.innerWidth, window.innerHeight);

    document
      .getElementById("scene")
      .appendChild(renderer.domElement);

    // =========================
    // LUMIÈRES
    // =========================
    const hemiLight = new THREE.HemisphereLight(
      0xffffff,
      0x444444,
      1.5
    );

    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(
      0xffffff,
      2
    );

    dirLight.position.set(5, 10, 7);

    scene.add(dirLight);

    // =========================
    // CONTROLS
    // =========================
    const controls = new OrbitControls(
      camera,
      renderer.domElement
    );

    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    controls.minDistance = 5;
    controls.maxDistance = 50;

    // Point visé par la caméra
    controls.target.set(0, 0, 0);

    // =========================
    // CHARGEMENT OBJ
    // =========================
    const mtlLoader = new MTLLoader();

    mtlLoader.load("./obj.mtl", (materials) => {

      materials.preload();

      const objLoader = new OBJLoader();

      objLoader.setMaterials(materials);

      objLoader.load("./tinker.obj", (obj) => {

        // Taille réduite
        obj.scale.set(0.5, 0.5, 0.5);

        // Rotation
        obj.rotation.x = -Math.PI / 2;

        // Position
        obj.position.set(0, 0, 0);

        scene.add(obj);

      });

    });

    // =========================
    // RESIZE
    // =========================
    window.addEventListener("resize", () => {

      camera.aspect =
        window.innerWidth / window.innerHeight;

      camera.updateProjectionMatrix();

      renderer.setSize(
        window.innerWidth,
        window.innerHeight
      );

    });

    // =========================
    // ANIMATION
    // =========================
    function animate() {

      requestAnimationFrame(animate);

      controls.update();

      renderer.render(scene, camera);

    }

    animate();

  </script>

</body>
</html>
