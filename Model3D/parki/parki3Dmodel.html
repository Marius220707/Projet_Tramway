<html lang="fr"><head>
  <meta charset="utf-8">
  <title>Test GLTF (importmap)</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #scene { width: 100vw; height: 100vh; }
  </style>

  <!-- Import map : on indique au navigateur où trouver "three" -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>

<body>
  <div id="scene"></div>

  <script type="module">
    import * as THREE from "three";
	import { OBJLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/OBJLoader.js";
	import { MTLLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/MTLLoader.js";
	import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";


    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    window.camera = camera;

    camera.position.set(

1.0294498737997984,
1,
2
    );



    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById("scene").appendChild(renderer.domElement);

    // Lumières
    const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
    scene.add(light);

    const dir = new THREE.DirectionalLight(0xffffff, 1);
    dir.position.set(3, 10, 10);
    scene.add(dir);
	
	// Ajout des contrôles de la caméra
	const controls = new OrbitControls(camera, renderer.domElement);

       window.controls = controls;

	controls.enableDamping = true; // effet "inertie"
	controls.dampingFactor = 0.05;
	controls.screenSpacePanning = true; // permet le pan en 2D
	controls.minDistance = 1; // distance minimale de zoom
	controls.maxDistance = 100; // distance maximale de zoom	

    // Chargement du modèle OBJ
	
	const mtlLoader = new MTLLoader();

mtlLoader.load("./parki.mtl", (materials) => {

  materials.preload();

  const objLoader = new OBJLoader();

  objLoader.setMaterials(materials);

  objLoader.load("./parki.obj", (obj) => {

    // Rotation éventuelle
    obj.rotation.y += Math.PI / 2;

    scene.add(obj);

    // =========================
    // AUTO FIT CAMERA
    // =========================

    const box = new THREE.Box3().setFromObject(obj);

    const center = box.getCenter(new THREE.Vector3());

    const size = box.getSize(new THREE.Vector3());

    // Taille maximale du modèle
    const maxDim = Math.max(size.x, size.y, size.z);

    // Champ de vision caméra
    const fov = camera.fov * (Math.PI / 180);

    // Distance idéale
    let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));

    cameraZ *= 1.8; // marge supplémentaire

    // Position caméra
    camera.position.set(
      center.x,
      center.y + maxDim * 0.3,
      center.z + cameraZ
    );

    // Regard caméra
    camera.lookAt(center);

    // OrbitControls cible
    controls.target.copy(center);

    controls.update();

  });

});


    // Adaptation à la taille de la fenêtre
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

	// Boucle d’animation
	function animate() {
	  requestAnimationFrame(animate);
	  
	  controls.update(); // mise à jour des contrôles

	  renderer.render(scene, camera);
	}
	animate();
  </script>


</body></html>
